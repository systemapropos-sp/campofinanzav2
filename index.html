<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#1B4332" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CampoFinanzas" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-startup-image" href="/apple-touch-icon.png" />

    <!-- Splash screens iOS -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- General -->
    <meta name="description" content="Sistema de Gestión Financiera para Campo y Agricultura" />
    <meta name="application-name" content="CampoFinanzas" />
    <meta name="msapplication-TileColor" content="#1B4332" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <title>CampoFinanzas</title>

    <style>
      /* Prevenir scroll bounce en iOS */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        height: 100%;
      }
      /* Safe area para iPhone notch */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Splash screen mientras carga */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: linear-gradient(180deg, #0D2818 0%, #1B4332 100%);
        z-index: 9999;
      }
      /* Disable double-tap zoom */
      * { touch-action: manipulation; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
